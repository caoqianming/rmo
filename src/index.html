<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rmo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="monitor" class="monitor" data-tauri-drag-region>
      <section id="metrics" class="metrics">
        <div class="metric-row" data-metric="cpu">
          <span class="metric-label">CPU</span>
          <span class="metric-value" id="cpu-value">0%</span>
        </div>
        <div class="metric-row" data-metric="memory">
          <span class="metric-label">内存</span>
          <span class="metric-value" id="mem-value">0%</span>
        </div>
        <div class="metric-row" data-metric="network-up">
          <span class="metric-label">上传</span>
          <span class="metric-value neutral" id="net-up-value">0.0 KB/s</span>
        </div>
        <div class="metric-row" data-metric="network-down">
          <span class="metric-label">下载</span>
          <span class="metric-value neutral" id="net-down-value">0.0 KB/s</span>
        </div>
        <div class="metric-row" data-metric="disk-read">
          <span class="metric-label">磁盘读</span>
          <span class="metric-value neutral" id="disk-read-value">0.0 KB/s</span>
        </div>
        <div class="metric-row" data-metric="disk-write">
          <span class="metric-label">磁盘写</span>
          <span class="metric-value neutral" id="disk-write-value">0.0 KB/s</span>
        </div>
      </section>

      <section id="control-panel" class="control-panel hidden">
        <label class="field">
          <span>刷新间隔</span>
          <input id="refresh-interval" type="range" min="1" max="10" step="0.5" />
          <output id="refresh-output">2.0s</output>
        </label>

        <label class="field">
          <span>透明度</span>
          <input id="opacity" type="range" min="0.3" max="1" step="0.05" />
          <output id="opacity-output">0.85</output>
        </label>

        <fieldset class="field checkbox-group">
          <legend>显示项</legend>
          <label><input id="show-cpu" type="checkbox" /> CPU</label>
          <label><input id="show-memory" type="checkbox" /> 内存</label>
          <label><input id="show-network" type="checkbox" /> 网络</label>
          <label><input id="show-disk" type="checkbox" /> 磁盘读写</label>
        </fieldset>

        <div class="panel-actions">
          <button type="button" id="hide-controls" class="ghost-button">完成</button>
          <button type="button" id="exit-app" class="ghost-button danger">退出</button>
        </div>

        <p id="settings-error" class="settings-error hidden"></p>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
